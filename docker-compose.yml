# ============================================================
# THOR DATA PIPELINE - Docker Compose Infrastructure
# Version: 1.0
# Architecture: MinIO (Bronze) → Spark → PostgreSQL (Gold)
#               Orchestrated by Airflow
# ============================================================

version: "3.8"

x-airflow-common: &airflow-common
  image: apache/airflow:2.9.0-python3.11
  env_file:
    - .env
  environment:
    AIRFLOW__CORE__EXECUTOR: ${AIRFLOW__CORE__EXECUTOR}
    AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW__CORE__FERNET_KEY}
    AIRFLOW__CORE__LOAD_EXAMPLES: ${AIRFLOW__CORE__LOAD_EXAMPLES}
    AIRFLOW__WEBSERVER__SECRET_KEY: ${AIRFLOW__WEBSERVER__SECRET_KEY}
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/airflow_meta
    # Cấp quyền cho Airflow gọi Spark & MinIO
    MINIO_ENDPOINT: http://minio:9000
    MINIO_ROOT_USER: ${MINIO_ROOT_USER}
    MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    SPARK_MASTER_URL: spark://spark-master:7077
  volumes:
    - ./dags:/opt/airflow/dags
    - ./logs:/opt/airflow/logs
    - ./plugins:/opt/airflow/plugins
    - ./src:/opt/airflow/src # Cho phép DAG gọi src/
    - ./requirements.txt:/requirements.txt
  depends_on:
    postgres:
      condition: service_healthy
  networks:
    - thor-network

# ============================================================
services:
  # ----------------------------------------------------------
  # 1. MinIO — S3-Compatible Data Lake (Bronze & Silver Layer)
  # ----------------------------------------------------------
  minio:
    image: minio/minio:latest
    container_name: thor-minio
    restart: unless-stopped
    env_file:
      - .env
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    ports:
      - "${MINIO_PORT}:9000" # S3 API endpoint
      - "${MINIO_CONSOLE_PORT}:9001" # Web UI
    volumes:
      - minio-data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - thor-network

  # ----------------------------------------------------------
  # 2. MinIO Init — Tự động tạo Buckets khi khởi động
  # ----------------------------------------------------------
  minio-init:
    image: minio/mc:latest
    container_name: thor-minio-init
    depends_on:
      minio:
        condition: service_healthy
    env_file:
      - .env
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 ${MINIO_ROOT_USER} ${MINIO_ROOT_PASSWORD};
      mc mb --ignore-existing local/${MINIO_BRONZE_BUCKET};
      mc mb --ignore-existing local/${MINIO_SILVER_BUCKET};
      echo '✅ MinIO buckets created: ${MINIO_BRONZE_BUCKET}, ${MINIO_SILVER_BUCKET}';
      exit 0;
      "
    networks:
      - thor-network

  # ----------------------------------------------------------
  # 3. PostgreSQL — Data Warehouse (Gold Layer) + Airflow Meta DB
  # ----------------------------------------------------------
  postgres:
    image: postgres:15-alpine
    container_name: thor-postgres
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      # Script init sẽ tạo thêm database airflow_meta
      POSTGRES_MULTIPLE_DATABASES: ${POSTGRES_DB},airflow_meta
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./docker/postgres/init-multiple-db.sh:/docker-entrypoint-initdb.d/init-multiple-db.sh
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - thor-network

  # ----------------------------------------------------------
  # 4. Spark Master
  # ----------------------------------------------------------
  spark-master:
    image: bitnamilegacy/spark:3.5.1
    container_name: thor-spark-master
    restart: unless-stopped
    environment:
      SPARK_MODE: master
      SPARK_RPC_AUTHENTICATION_ENABLED: "no"
      SPARK_RPC_ENCRYPTION_ENABLED: "no"
      SPARK_LOCAL_STORAGE_ENCRYPTION_ENABLED: "no"
      SPARK_SSL_ENABLED: "no"
      # Cấu hình để Spark đọc/ghi MinIO (S3A)
      SPARK_EXTRA_CLASSPATH: "/opt/bitnami/spark/jars/hadoop-aws-3.3.4.jar:/opt/bitnami/spark/jars/aws-java-sdk-bundle-1.12.262.jar"
    ports:
      - "${SPARK_MASTER_PORT}:7077"
      - "${SPARK_MASTER_WEBUI_PORT}:8080"
    volumes:
      - ./src:/opt/bitnami/spark/src
      - spark-logs:/opt/bitnami/spark/logs
    networks:
      - thor-network

  # ----------------------------------------------------------
  # 5. Spark Worker
  # ----------------------------------------------------------
  spark-worker:
    image: bitnamilegacy/spark:3.5.1
    container_name: thor-spark-worker
    restart: unless-stopped
    environment:
      SPARK_MODE: worker
      SPARK_MASTER_URL: spark://spark-master:7077
      SPARK_WORKER_MEMORY: 2G # Điều chỉnh theo RAM máy bạn
      SPARK_WORKER_CORES: 2 # Điều chỉnh theo CPU máy bạn
      SPARK_RPC_AUTHENTICATION_ENABLED: "no"
      SPARK_RPC_ENCRYPTION_ENABLED: "no"
    ports:
      - "${SPARK_WORKER_WEBUI_PORT}:8081"
    volumes:
      - ./src:/opt/bitnami/spark/src
    depends_on:
      - spark-master
    networks:
      - thor-network

  # ----------------------------------------------------------
  # 6. Airflow — Webserver
  # ----------------------------------------------------------
  airflow-webserver:
    <<: *airflow-common
    container_name: thor-airflow-webserver
    restart: unless-stopped
    command: webserver
    ports:
      - "${AIRFLOW_PORT}:8080"
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5

  # ----------------------------------------------------------
  # 7. Airflow — Scheduler
  # ----------------------------------------------------------
  airflow-scheduler:
    <<: *airflow-common
    container_name: thor-airflow-scheduler
    restart: unless-stopped
    command: scheduler
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'airflow jobs check --job-type SchedulerJob --hostname "$${HOSTNAME}"',
        ]
      interval: 30s
      timeout: 10s
      retries: 5

  # ----------------------------------------------------------
  # 8. Airflow — DB Init (chỉ chạy một lần)
  # ----------------------------------------------------------
  airflow-init:
    <<: *airflow-common
    container_name: thor-airflow-init
    entrypoint: /bin/bash
    command:
      - -c
      - |
        pip install -r /requirements.txt
        airflow db migrate
        airflow users create \
          --username admin \
          --firstname Thor \
          --lastname Admin \
          --role Admin \
          --email admin@thor-pipeline.com \
          --password admin
        echo "✅ Airflow initialized successfully"

  # ----------------------------------------------------------
  # 9. Jupyter Notebook — Development Environment
  # ----------------------------------------------------------
  jupyter:
    image: jupyter/pyspark-notebook:latest
    container_name: thor-jupyter
    restart: unless-stopped
    environment:
      JUPYTER_ENABLE_LAB: "yes"
      JUPYTER_TOKEN: ${JUPYTER_TOKEN}
      # MinIO credentials cho notebooks
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    ports:
      - "${JUPYTER_PORT}:8888"
    volumes:
      - ./notebooks:/home/jovyan/work/notebooks
      - ./src:/home/jovyan/work/src
      - ./data:/home/jovyan/work/data
    depends_on:
      - spark-master
      - minio
    networks:
      - thor-network

# ============================================================
networks:
  thor-network:
    driver: bridge
    name: thor-pipeline-network

volumes:
  minio-data:
    name: thor-minio-data
  postgres-data:
    name: thor-postgres-data
  spark-logs:
    name: thor-spark-logs
